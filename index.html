<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سرزمین ریاضی ایران</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<img src="images/banner.png" class="examBanner">

<h2 class="examTitle">آزمون هوشمند ریاضی دوم دبستان</h2>


<p>

سلام دوست خوبم 🌸


</p>

<input
type="text"
id="studentName"
placeholder="نام زیبایت را وارد کن">

<br><br>

<button id="startBtn">

🚀 شروع ماجراجویی

</button>
<br><br>

<p class="designer">
طراحی و تولید:<br>
آمنه صادق کاظمی<br>
</p>
</div>
<!-- صفحه آزمون -->

<div id="quizBox" style="display:none;">
<div class="quizHeader">


<h3 id="playerBox"></h3>

<h3 id="scoreBox">⭐ امتیاز: ۰</h3>


</div>
<h2 id="questionTitle"></h2>

<div id="progressBar">

<div id="progressFill"></div>

</div>
<p id="messageBox"></p>
<div id="answers"></div>

<br>


</div>
<div id="resultBox" style="display:none;">

<h2>🏆  کارنامه ماجراجویی تو</h2>

<p id="resultName"></p>

<p id="resultScore"></p>

<p id="resultMessage"></p>

<button onclick="location.reload()">

🔄 دوباره امتحان می‌کنم

</button>

</div>
<audio id="correctSound" src="sounds/correct.mp3"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3"></audio>
<script src="js/script.js"></script>

</body>

</html>
